version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: accounting-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: accounting-2026
    volumes:
      - mongodb_data:/data/db
    networks:
      - accounting-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/accounting-2026
      JWT_SECRET: your_jwt_secret_key
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - accounting-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accounting-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - accounting-network

volumes:
  mongodb_data:

networks:
  accounting-network:
    driver: bridge